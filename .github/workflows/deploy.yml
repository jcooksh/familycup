name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # refresh live scores roughly every 10 minutes during the tournament
    - cron: "*/10 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# allow one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pull latest match data. Won't fail the build if the key is missing or
      # the API is unavailable (e.g. pre-tournament) — the committed JSON is used.
      - name: Fetch live scores
        continue-on-error: true
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: npm run fetch-scores

      - name: Build
        env:
          GITHUB_PAGES: "1"
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
